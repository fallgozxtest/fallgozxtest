name: Metrics
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'github-metrics.svg'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          user: fallgozxtest
          template: classic
          output_action: commit
          committer_branch: main
          committer_message: 'chore: update metrics [Skip GitHub Action]'
          token: ${{ secrets.METRICS_TOKEN }}
